name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0). Must follow semver.'
        required: true
      python_version:
        description: 'Python version to bundle (e.g. 3.13.13)'
        required: true
        default: '3.13.13'
      python_standalone_version:
        description: 'python-build-standalone release date (e.g. 20260414)'
        required: true
        default: '20260414'

jobs:
  build-tag:
    runs-on: ubuntu-22.04
    steps:
      - name: clone
        run: |
          # can't use actions/checkout here as transferring the shallow clone fails when using upload-/download-artifact
          git clone https://github.com/$GITHUB_REPOSITORY . --depth=1
          git fetch origin main --depth=1
          git checkout main
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: build-tag
        run: |
          git config --global user.email "release@asgardehs.github.io"
          git config --global user.name "ratatoskr releaser"
          ./hack/build-tag.sh ${{ inputs.version }} ${{ inputs.python_version }} ${{ inputs.python_standalone_version }}
      - name: git gc
        run: git gc
      - name: archive .git
        run: tar cf git-archive.tar .git
      - uses: actions/upload-artifact@v4
        with:
          name: workdir
          path: git-archive.tar

  tests:
    needs: build-tag
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-13
          - windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workdir
      - name: restore .git
        shell: bash
        run: tar xf git-archive.tar
      - name: checkout tag
        shell: bash
        run: |
          git reset --hard
          git checkout ${{ inputs.version }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: run tests
        shell: bash
        run: go test -tags ratatoskr_embed ./... -v

  release:
    needs: tests
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workdir
      - name: restore .git
        run: tar xf git-archive.tar
      - name: update remote url
        run: |
          git remote set-url origin https://token:$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: push tag
        run: git push origin ${{ inputs.version }}
